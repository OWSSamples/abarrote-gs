name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full-history scan every Monday 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks secret scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for proper scan

      - name: Install gitleaks
        run: |
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sh -s -- -b /usr/local/bin

      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose

  npm-audit:
    name: Bun dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Audit (high+ severity)
        run: bun audit --audit-level=high || echo "::warning::Dependency vulnerabilities found"
