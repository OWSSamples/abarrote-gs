<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="52%">
      <stop offset="0%" stop-color="#EDE0FF"/>
      <stop offset="100%" stop-color="#C4A8FF"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#9B59FF"/>
      <stop offset="100%" stop-color="#5B0FCC"/>
    </radialGradient>
    <radialGradient id="headGrad" cx="38%" cy="30%" r="62%">
      <stop offset="0%" stop-color="#B57BFF"/>
      <stop offset="100%" stop-color="#6E20E0"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="70%" stop-color="#E8D5FF"/>
      <stop offset="100%" stop-color="#C0A0FF"/>
    </radialGradient>
    <radialGradient id="pupilGrad" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#9B59FF"/>
      <stop offset="100%" stop-color="#1C004F"/>
    </radialGradient>
    <linearGradient id="antennaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6BF8"/>
      <stop offset="100%" stop-color="#7126FF"/>
    </linearGradient>
    <linearGradient id="mouthGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9BF8"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#9BFFF8"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#5B0FCC" flood-opacity="0.35"/>
    </filter>
    <filter id="sparkGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="150" cy="150" r="138" fill="url(#bgGrad)"/>
  <circle cx="150" cy="150" r="138" fill="none" stroke="#D0AAFF" stroke-width="2.5"/>

  <!-- Floating sparkles -->
  <g filter="url(#sparkGlow)">
    <!-- Top-left star -->
    <path d="M62 72 l4 10 l10 4 l-10 4 l-4 10 l-4-10 l-10-4 l10-4z" fill="#FF6BF8" opacity="0.9"/>
    <!-- Top-right star -->
    <path d="M232 58 l3 7 l7 3 l-7 3 l-3 7 l-3-7 l-7-3 l7-3z" fill="#6BFFF8" opacity="0.9"/>
    <!-- Small dot decorations -->
    <circle cx="240" cy="100" r="5" fill="#FFD700" opacity="0.85"/>
    <circle cx="55" cy="118" r="4" fill="#FF9BF8" opacity="0.8"/>
    <circle cx="88" cy="50" r="3" fill="#9BFFF8" opacity="0.8"/>
    <circle cx="214" cy="82" r="3.5" fill="#FFB347" opacity="0.8"/>
  </g>

  <!-- Robot body (torso) -->
  <g filter="url(#softShadow)">
    <rect x="96" y="192" width="108" height="72" rx="20" fill="url(#bodyGrad)"/>
    <!-- Body highlight -->
    <rect x="106" y="198" width="88" height="8" rx="4" fill="white" opacity="0.15"/>
    <!-- Chest panel -->
    <rect x="114" y="214" width="72" height="36" rx="10" fill="#1C004F" opacity="0.35"/>
    <!-- LED indicators -->
    <circle cx="132" cy="226" r="5" fill="#6BFFF8" filter="url(#sparkGlow)"/>
    <circle cx="150" cy="226" r="5" fill="#FF9BF8" filter="url(#sparkGlow)"/>
    <circle cx="168" cy="226" r="5" fill="#FFD700" filter="url(#sparkGlow)"/>
    <!-- Smile bar -->
    <rect x="126" y="238" width="48" height="6" rx="3" fill="url(#mouthGrad)" opacity="0.9"/>
  </g>

  <!-- Robot arms -->
  <rect x="58" y="198" width="32" height="52" rx="16" fill="url(#bodyGrad)"/>
  <rect x="210" y="198" width="32" height="52" rx="16" fill="url(#bodyGrad)"/>
  <!-- Hand circles -->
  <circle cx="74" cy="258" r="13" fill="url(#headGrad)"/>
  <circle cx="226" cy="258" r="13" fill="url(#headGrad)"/>

  <!-- Neck -->
  <rect x="132" y="178" width="36" height="20" rx="8" fill="url(#bodyGrad)"/>

  <!-- Robot head -->
  <g filter="url(#softShadow)">
    <rect x="76" y="86" width="148" height="102" rx="34" fill="url(#headGrad)"/>
    <!-- Head highlight shine -->
    <ellipse cx="128" cy="100" rx="38" ry="12" fill="white" opacity="0.18"/>
  </g>

  <!-- Antenna stem -->
  <rect x="146" y="56" width="8" height="36" rx="4" fill="url(#antennaGrad)"/>

  <!-- Antenna orb with glow -->
  <circle cx="150" cy="50" r="14" fill="#1C004F" opacity="0.3" filter="url(#glow)"/>
  <circle cx="150" cy="50" r="11" fill="url(#antennaGrad)" filter="url(#glow)"/>
  <circle cx="150" cy="50" r="7" fill="#FFD700"/>
  <circle cx="147" cy="47" r="2.5" fill="white" opacity="0.8"/>

  <!-- Left eye -->
  <ellipse cx="118" cy="136" rx="22" ry="24" fill="url(#eyeGlow)"/>
  <ellipse cx="118" cy="138" rx="15" ry="17" fill="url(#pupilGrad)"/>
  <circle cx="118" cy="136" r="8" fill="#7126FF"/>
  <circle cx="118" cy="134" r="4" fill="white"/>
  <!-- Eye gleam -->
  <circle cx="112" cy="130" r="3" fill="white" opacity="0.9"/>
  <circle cx="122" cy="143" r="1.5" fill="white" opacity="0.55"/>

  <!-- Right eye -->
  <ellipse cx="182" cy="136" rx="22" ry="24" fill="url(#eyeGlow)"/>
  <ellipse cx="182" cy="138" rx="15" ry="17" fill="url(#pupilGrad)"/>
  <circle cx="182" cy="136" r="8" fill="#7126FF"/>
  <circle cx="182" cy="134" r="4" fill="white"/>
  <!-- Eye gleam -->
  <circle cx="176" cy="130" r="3" fill="white" opacity="0.9"/>
  <circle cx="186" cy="143" r="1.5" fill="white" opacity="0.55"/>

  <!-- Mouth / smile -->
  <path d="M124 166 Q150 184 176 166" stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M124 166 Q150 184 176 166" stroke="#FF9BF8" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Chat bubble (top right of head) -->
  <g filter="url(#sparkGlow)">
    <rect x="210" y="58" width="58" height="36" rx="12" fill="#FF6BF8"/>
    <path d="M218 94 l-8 10 l18 0z" fill="#FF6BF8"/>
    <!-- Dots inside bubble -->
    <circle cx="228" cy="76" r="4.5" fill="white"/>
    <circle cx="240" cy="76" r="4.5" fill="white"/>
    <circle cx="252" cy="76" r="4.5" fill="white"/>
  </g>
</svg>
